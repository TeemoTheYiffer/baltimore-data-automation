variables:
  GCP_PROJECT_ID: "parabolic-clock-457218-f5"
  GCP_REGION: "us-east1"
  IMAGE_NAME: "gcr.io/${GCP_PROJECT_ID}/maryland-automation-app"
  SERVICE_NAME: "maryland-automation-app"

stages:
  - build
  - deploy

# ── Build & push Docker image to GCR ──────────────────────────
build:
  stage: build
  image: google/cloud-sdk:slim
  before_script:
    - gcloud auth activate-service-account --key-file="$GCP_SA_KEY"
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - cd src
    # Inject app_secrets (gitignored, not in repo)
    - mkdir -p app_secrets
    - touch app_secrets/__init__.py
    - cp "$GCP_APP_CREDENTIALS" app_secrets/parabolic-clock-457218-f5-886e8be4f217.json
    - |
      cat > app_secrets/google_credentials.py <<'PYEOF'
      SERVICE_ACCOUNT_FILE = 'app_secrets/parabolic-clock-457218-f5-886e8be4f217.json'
      CLIENT_ID = None
      CLIENT_SECRET = None
      API_KEY = None
      CLIENT_SECRETS_FILE = None
      IMPERSONATED_USER = None
      PYEOF
    - sed -i 's/^      //' app_secrets/google_credentials.py
    # Submit build async to avoid log-streaming permission issues
    - BUILD_ID=$(gcloud builds submit --tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" --async --format='value(id)')
    - echo "Build started - ID $BUILD_ID"
    # Poll until build completes
    - |
      while true; do
        STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)')
        case "$STATUS" in
          SUCCESS) echo "Build succeeded"; break ;;
          FAILURE|TIMEOUT|CANCELLED|EXPIRED) echo "Build failed: $STATUS"; exit 1 ;;
          *) echo "Status: $STATUS - waiting..."; sleep 15 ;;
        esac
      done
    # Tag as latest for easy reference
    - gcloud container images add-tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:latest" --quiet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Deploy to production (main branch only) ───────────────────
deploy-production:
  stage: deploy
  image: google/cloud-sdk:slim
  before_script:
    - gcloud auth activate-service-account --key-file="$GCP_SA_KEY"
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - |
      gcloud run deploy "${SERVICE_NAME}" \
        --image "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" \
        --platform managed \
        --region "${GCP_REGION}" \
        --allow-unauthenticated \
        --timeout "1800" \
        --max-instances "2" \
        --min-instances "1" \
        --cpu "8" \
        --memory "16Gi" \
        --concurrency "10" \
        --cpu-boost \
        --execution-environment gen2 \
        --set-env-vars "MARYLAND_APP_API_KEY_ID=${MARYLAND_APP_API_KEY_ID},MARYLAND_APP_API_KEY_SECRET=${MARYLAND_APP_API_KEY_SECRET}"
    - echo "Deployed to production"
    - gcloud run services describe "${SERVICE_NAME}" --region="${GCP_REGION}" --format="value(status.url)"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
    url: https://maryland-automation-app-${GCP_REGION}.run.app

# ── Deploy to staging (merge requests only) ───────────────────
deploy-staging:
  stage: deploy
  image: google/cloud-sdk:slim
  before_script:
    - gcloud auth activate-service-account --key-file="$GCP_SA_KEY"
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - |
      gcloud run deploy "${SERVICE_NAME}-staging" \
        --image "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" \
        --platform managed \
        --region "${GCP_REGION}" \
        --no-allow-unauthenticated \
        --timeout "1800" \
        --max-instances "1" \
        --min-instances "0" \
        --cpu "8" \
        --memory "16Gi" \
        --concurrency "10" \
        --cpu-boost \
        --execution-environment gen2 \
        --set-env-vars "MARYLAND_APP_API_KEY_ID=${MARYLAND_APP_API_KEY_ID},MARYLAND_APP_API_KEY_SECRET=${MARYLAND_APP_API_KEY_SECRET}"
    - echo "Deployed to staging"
    - gcloud run services describe "${SERVICE_NAME}-staging" --region="${GCP_REGION}" --format="value(status.url)"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  environment:
    name: staging
    url: https://maryland-automation-app-staging-${GCP_REGION}.run.app
