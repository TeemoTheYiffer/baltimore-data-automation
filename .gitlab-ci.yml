variables:
  GCP_PROJECT_ID: "parabolic-clock-457218-f5"
  GCP_REGION: "us-east1"
  IMAGE_NAME: "gcr.io/${GCP_PROJECT_ID}/maryland-automation-app"
  SERVICE_NAME: "maryland-automation-app"

stages:
  - build
  - deploy

# ── Build & push Docker image to GCR ──────────────────────────
build:
  stage: build
  image: google/cloud-sdk:slim
  before_script:
    - echo "$GCP_SA_KEY" > /tmp/sa-key.json
    - gcloud auth activate-service-account --key-file=/tmp/sa-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - cd src
    - gcloud builds submit --tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    # Also tag as latest for easy reference
    - gcloud container images add-tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:latest" --quiet
  after_script:
    - rm -f /tmp/sa-key.json
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Deploy to production (main branch only) ───────────────────
deploy-production:
  stage: deploy
  image: google/cloud-sdk:slim
  before_script:
    - echo "$GCP_SA_KEY" > /tmp/sa-key.json
    - gcloud auth activate-service-account --key-file=/tmp/sa-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - |
      gcloud run deploy "${SERVICE_NAME}" \
        --image "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" \
        --platform managed \
        --region "${GCP_REGION}" \
        --allow-unauthenticated \
        --timeout "1800" \
        --max-instances "2" \
        --min-instances "1" \
        --cpu "8" \
        --memory "16Gi" \
        --concurrency "10" \
        --cpu-boost \
        --execution-environment gen2
    - echo "Deployed to production"
    - gcloud run services describe "${SERVICE_NAME}" --region="${GCP_REGION}" --format="value(status.url)"
  after_script:
    - rm -f /tmp/sa-key.json
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
    url: https://maryland-automation-app-${GCP_REGION}.run.app

# ── Deploy to staging (merge requests only) ───────────────────
deploy-staging:
  stage: deploy
  image: google/cloud-sdk:slim
  before_script:
    - echo "$GCP_SA_KEY" > /tmp/sa-key.json
    - gcloud auth activate-service-account --key-file=/tmp/sa-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - |
      gcloud run deploy "${SERVICE_NAME}-staging" \
        --image "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" \
        --platform managed \
        --region "${GCP_REGION}" \
        --allow-unauthenticated \
        --timeout "1800" \
        --max-instances "1" \
        --min-instances "0" \
        --cpu "4" \
        --memory "8Gi" \
        --concurrency "10" \
        --cpu-boost \
        --execution-environment gen2
    - echo "Deployed to staging"
    - gcloud run services describe "${SERVICE_NAME}-staging" --region="${GCP_REGION}" --format="value(status.url)"
  after_script:
    - rm -f /tmp/sa-key.json
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  environment:
    name: staging
    url: https://maryland-automation-app-staging-${GCP_REGION}.run.app
